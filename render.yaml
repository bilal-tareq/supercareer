services:
  - type: web
    name: supercareer-backend
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn supercareer.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "supercareer.onrender.com"
      - key: DJANGO_SECRET_KEY
        fromSecret: SUPERCAREER_SECRET_KEY
